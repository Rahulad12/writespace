services:
  backend:
    build: ./server
    container_name: writespace-backend

    ports:
      - "5000:5000"

    volumes:
      - ./server:/app
      - /app/node_modules

    environment:
      PORT: 5000
      DATABASE_URL: postgresql://rahul:password@postgres:5432/writespace

    depends_on:
      - postgres

  frontend:
    build: ./client
    container_name: writespace-frontend

    ports:
      - "5173:5173"

    volumes:
      - ./client:/app
      - /app/node_modules

    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: postgres_db

    restart: unless-stopped

    environment:
      POSTGRES_USER: rahul
      POSTGRES_PASSWORD: password
      POSTGRES_DB: writespace

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: